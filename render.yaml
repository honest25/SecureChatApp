services:
  - type: web
    name: securechatapp-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: "npm install --include=dev && npm run build && npx prisma generate && npx prisma db push --accept-data-loss"
    startCommand: "npm run start"
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: DATABASE_URL
        fromDatabase:
          name: securechatapp-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: securechatapp-redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: "https://secure-chat-app-sepia.vercel.app"

  - type: redis
    name: securechatapp-redis
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere

databases:
  - name: securechatapp-db
    plan: free
    databaseName: securechat
    user: securechatuser
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
