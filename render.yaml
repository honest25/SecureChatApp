services:
  - type: web
    name: securechatapp-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: "npm install && npm run build && npx prisma generate && npx prisma migrate deploy"
    startCommand: "npm run start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: DATABASE_URL
        fromDatabase:
          name: securechatapp-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: securechatapp-redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: "https://your-frontend-project.vercel.app" # REPLACE THIS in Render Dashboard later

  - type: redis
    name: securechatapp-redis
    plan: free

databases:
  - name: securechatapp-db
    plan: free
    databaseName: securechat
    user: securechatuser
